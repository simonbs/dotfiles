model = "gpt-5.4"
approval_policy = "never"
sandbox_mode = "danger-full-access"
model_reasoning_effort = "medium"
suppress_unstable_features_warning = true
web_search = "live"
personality = "pragmatic"
model_context_window = 1000000
model_auto_compact_token_limit = 1000000

# brrr agent integration start
notify = ["brrr", "agent", "dispatch", "--agent", "codex", "--event", "finished", "--webhook", "$BRRR_WEBHOOK_URL", "--idle-seconds", "--payload-json"]
# brrr agent integration end

[sandbox_workspace_write]
network_access = true

[features]
unified_exec = true
shell_snapshot = true
multi_agent = true
collaboration_modes = true
steer = true

[notice]
hide_rate_limit_model_nudge = true

[notice.model_migrations]
"gpt-5.1-codex-mini" = "gpt-5.2-codex"
"gpt-5.2" = "gpt-5.2-codex"

[mcp_servers.xcode]
command = "xcrun"
args = ["mcpbridge"]
enabled = false

[plugins."github@openai-curated"]
enabled = true

[tui]
status_line = ["model-with-reasoning", "current-dir", "five-hour-limit", "weekly-limit"]
