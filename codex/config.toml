model = "gpt-5.5"
approval_policy = "never"
sandbox_mode = "danger-full-access"
model_reasoning_effort = "high"
suppress_unstable_features_warning = true
web_search = "live"
personality = "pragmatic"
model_context_window = 1000000
model_auto_compact_token_limit = 1000000

# brrr agent integration start
# brrr original notify json: ["/Users/simonbs/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient","turn-ended","--previous-notify","[\"brrr\",\"agent\",\"dispatch\",\"--agent\",\"codex\",\"--event\",\"finished\",\"--webhook\",\"$BRRR_WEBHOOK_URL\",\"--idle-seconds\",\"20\",\"--payload-json\"]"]
notify = ["brrr", "agent", "dispatch", "--agent", "codex", "--event", "finished", "--webhook", "$BRRR_WEBHOOK_URL", "--idle-seconds", "20", "--payload-json"]
# brrr agent integration end

[sandbox_workspace_write]
network_access = true

[features]
unified_exec = true
shell_snapshot = true
multi_agent = true
collaboration_modes = true
steer = true
goals = true
js_repl = false

[notice]
hide_rate_limit_model_nudge = true

[notice.model_migrations]
"gpt-5.1-codex-mini" = "gpt-5.2-codex"
"gpt-5.2" = "gpt-5.2-codex"
"gpt-5.4" = "gpt-5.5"

[plugins."github@openai-curated"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."chrome@openai-bundled"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."pdf@openai-primary-runtime"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[tui]
status_line = ["model-with-reasoning", "current-dir", "git-branch", "pull-request-number", "context-used", "task-progress"]
status_line_use_colors = true

[tui.model_availability_nux]
"gpt-5.5" = 4

[mcp_servers.chrome-devtools]
command = "npx"
args = ["chrome-devtools-mcp@latest"]

[mcp_servers.wwdc26]
url = "https://wwdc26.framnatools.io/mcp"

[desktop]
localeOverride = "en-US"
mac-menu-bar-enabled = false
preventSleepWhileRunning = true
show-context-window-usage = true
keepRemoteControlAwakeWhilePluggedIn = true
git-show-sidebar-pr-icons = true
git-always-force-push = false
git-create-pull-request-as-draft = false
reviewDelivery = "inline"
appearanceTheme = "dark"
appearanceDarkCodeThemeId = "dracula"
usePointerCursors = false
useFontSmoothing = true
sansFontSize = 15
codeFontSize = 15
appearanceDiffMarkerStyle = "color"

[desktop.open-in-target-preferences]
global = "systemDefault"

[desktop.appearanceDarkChromeTheme]
accent = "#ff79c6"
contrast = 60
ink = "#f8f8f2"
opaqueWindows = false
surface = "#282a36"

[desktop.appearanceDarkChromeTheme.fonts]
code = "FiraCode-Retina"

[desktop.appearanceDarkChromeTheme.semanticColors]
diffAdded = "#50fa7b"
diffRemoved = "#ff5555"
skill = "#ff79c6"
[projects."/Users/simonbs/Desktop/Lumos"]
trust_level = "trusted"
[projects."/Users/simonbs/Developer/banzai-build"]
trust_level = "trusted"
