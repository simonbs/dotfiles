# Prefix
# unbind C-b
# set -g prefix C-b
# bind C-b send-prefix

# Terminal and colors
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

# Indexing
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Windows
bind c new-window -c "#{pane_current_path}"
bind-key Left  run-shell 'wid=$(tmux display-message -p "#{window_id}"); tmux swap-window -t -1; tmux select-window -t "$wid"'
bind-key Right run-shell 'wid=$(tmux display-message -p "#{window_id}"); tmux swap-window -t +1; tmux select-window -t "$wid"'

# Splits
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Mouse
set -g mouse on

# Faster escape handling
set -s escape-time 0

# Ctrl + number switches windows
unbind -n C-1
unbind -n C-2
unbind -n C-3
unbind -n C-4
unbind -n C-5
bind -n C-1 select-window -t :1
bind -n C-2 select-window -t :2
bind -n C-3 select-window -t :3
bind -n C-4 select-window -t :4
bind -n C-5 select-window -t :5

# Default shell
set -g default-shell /bin/zsh

# Status bar
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#282a36,fg=#f8f8f2"

set -g message-style "bg=#44475a,fg=#f8f8f2"
set -g message-command-style "bg=#44475a,fg=#f8f8f2"

set -g pane-border-style "fg=#44475a"
set -g pane-active-border-style "fg=#bd93f9"

set -g status-left-length 32
set -g status-left "#[bg=#bd93f9,fg=#282a36,bold] #S "

setw -g window-status-separator ""
setw -g window-status-style "bg=#282a36,fg=#6272a4"
setw -g window-status-last-style "bg=#282a36,fg=#6272a4"
setw -g window-status-activity-style "bg=#282a36,fg=#6272a4"
setw -g window-status-bell-style "bg=#282a36,fg=#6272a4"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "bg=#ff79c6,fg=#282a36,bold"
setw -g window-status-current-format " #I:#W "

set -g status-right-length 80
set -g status-right ""

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"

# Enter copy mode with prefix followed by Ctrl-^
bind -T prefix C-^ copy-mode
